title: WeSearchAI
description: >
  WeSearchAI is a global research and news platform covering football and sports reports, health services and healthcare news, politics, business, entertainment, and world affairs.
baseurl: ""
url: "https://www.wesearchai.com"
author: WeSearchAI Team
email: martinskilo823@gmail.com
phone: "+2348132329272"

# Build settings
markdown: kramdown
theme: minima
permalink: /:year/:month/:day/:title.html

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Google Analytics
google_analytics: "UA-XXXXXXXXX-X"

# Google Search Console verification
google_site_verification: "6jsTOtG13iieedPnkqojfbc9DaY8gqMzfh7vSsRJ1nw"

# AdSense
adsense: "ca-pub-xxxxxxxxxxxxxxxx"

# Pagination
paginate: 10
paginate_path: "/page:num"

# Exclude files
exclude:
  - .github/
  - .gitignore
  - Gemfile
  - Gemfile.lock
  - README.md
  - CHANGELOG.md
  - LICENSE

# Collections
collections:
  posts:
    output: true
    permalink: /:collection/:year/:month/:day/:title.html
