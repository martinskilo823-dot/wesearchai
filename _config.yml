title: WeSearchAI
description: >
  Your trusted source for global news, insights, and information covering sports, 
  football, health, medical discoveries, politics, business, and entertainment.
baseurl: ""
url: "https://wesearchai.com"
author: WeSearchAI Team
email: martinskilo823@gmail.com
phone: "+2348132329272"

# Build settings
markdown: kramdown
theme: minima
permalink: /:year/:month/:day/:title.html

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Google Analytics
google_analytics: "UA-XXXXXXXXX-X"

# AdSense
adsense: "ca-pub-xxxxxxxxxxxxxxxx"

# Pagination
paginate: 10
paginate_path: "/page:num"

# Exclude files
exclude:
  - .github/
  - .gitignore
  - Gemfile
  - Gemfile.lock
  - README.md
  - CHANGELOG.md
  - LICENSE

# Collections
collections:
  posts:
    output: true
    permalink: /:collection/:year/:month/:day/:title.html
