<!DOCTYPE html>
<html lang="en" data-region="Global" data-focus="ai-policy-energy-healthcare">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ page.excerpt | strip_html | strip_newlines | truncate: 160 | default: site.description }}">
    <meta name="keywords" content="global news, football news, health services, healthcare, politics, research services, world affairs, sports, business, entertainment">
    <meta name="geo.region" content="Global">
    <meta name="google-site-verification" content="6jsTOtG13iieedPnkqojfbc9DaY8gqMzfh7vSsRJ1nw">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/images/wesearchai.png' | relative_url }}">
    <link rel="shortcut icon" href="{{ '/assets/images/wesearchai.png' | relative_url }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/images/wesearchai.png' | relative_url }}">
    <meta property="og:image" content="{{ '/assets/images/wesearchai.png' | absolute_url }}">
    <title>{{ page.title | default: site.title }} | Global News, Football, Health & Politics</title>
    {% if site.baseurl %}
        <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    {% else %}
        <link rel="stylesheet" href="/assets/css/style.css">
    {% endif %}
    <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
    {% seo %}
    <meta property="og:title" content="{{ page.title | default: site.title }}">
    <meta property="og:description" content="{{ page.excerpt | strip_html | strip_newlines | truncate: 200 | default: site.description }}">
    <meta property="og:url" content="{{ page.url | absolute_url }}">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-xxxxxxxxxxxxxxxx"
        crossorigin="anonymous"></script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-H44GKDMGZ8"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-H44GKDMGZ8');
    </script>
</head>
<body data-country="Global">
    {% include header.html %}
    <main class="container" role="main" data-content-region="Global">
        {{ content }}
    </main>
    {% include footer.html %}
</body>
</html>
